<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>특근매식비 계산기</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.1/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <h1>특근매식비 계산 웹앱</h1>
        <p>엑셀 또는 CSV 파일을 업로드하면 정규근무시간 기준으로 특근매식비를 자동 계산합니다.</p>
      </header>

      <main class="content-grid">
        <section class="panel controls-panel">
          <h2>1. 입력 정보</h2>

          <label class="file-upload">
            <span>파일 업로드 (.xlsx / .csv)</span>
            <input id="fileInput" type="file" accept=".xlsx,.csv" />
          </label>

          <div class="input-group">
            <label for="regularStart">정규근무 개시</label>
            <input id="regularStart" type="time" value="09:00" />
          </div>

          <div class="input-group">
            <label for="regularEnd">정규근무 종료</label>
            <input id="regularEnd" type="time" value="18:00" />
          </div>

          <div class="summary-box">
            <div>아침 기준선 <strong id="morningBoundary">07:00</strong></div>
            <div>저녁 기준선 <strong id="eveningBoundary">20:00</strong></div>
          </div>

          <button id="calculateBtn" class="primary-btn">계산하기</button>
          <button id="downloadBtn" class="secondary-btn" disabled>CSV 다운로드</button>
          <div id="message" class="message" role="status"></div>
        </section>

        <section class="panel result-panel">
          <div class="result-header">
            <h2>2. 계산 결과</h2>
            <div class="total-box">
              <span>월 합계</span>
              <strong id="totalAmount">0원</strong>
            </div>
          </div>

          <div class="table-wrapper">
            <table id="resultTable">
              <thead>
                <tr>
                  <th>날짜</th>
                  <th>출근</th>
                  <th>퇴근</th>
                  <th>휴일</th>
                  <th>근무시간</th>
                  <th>아침</th>
                  <th>저녁</th>
                  <th>식수</th>
                  <th>금액</th>
                  <th>비고</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
